name: Flutter CI and Web Deploy

on:
  pull_request:
    branches: [ develop, main ]
  push:
    branches: [ develop, main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-ci:
    name: Analyze, Test and Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - name: Build Flutter Web
        run: >-
          flutter build web
          --release
          --dart-define=API_BASE_URL=https://api.togethertrip.co.kr
      - name: Upload Flutter Web artifact
        if: github.ref == 'refs/heads/main' && (github.event_name == 'workflow_dispatch' || github.event_name == 'push') && vars.DEPLOY_ENABLED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: togethertrip-flutter-web
          path: build/web
          if-no-files-found: error
          retention-days: 1

  deploy-web:
    name: Deploy Flutter Web to S3
    if: github.ref == 'refs/heads/main' && (github.event_name == 'workflow_dispatch' || github.event_name == 'push') && vars.DEPLOY_ENABLED == 'true'
    needs: flutter-ci
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download Flutter Web artifact
        uses: actions/download-artifact@v4
        with:
          name: togethertrip-flutter-web
          path: build/web

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync Flutter Web assets
        run: aws s3 sync build/web "s3://${{ vars.S3_BUCKET }}" --delete

      - name: Invalidate CloudFront cache
        run: >-
          aws cloudfront create-invalidation
          --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}"
          --paths "/*"
