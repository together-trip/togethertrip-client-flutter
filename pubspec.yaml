name: togethertrip
description: "TogetherTrip Flutter app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  kakao_flutter_sdk_user: ^1.9.4
  flutter_secure_storage: ^9.2.4
  http: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.5
  build_runner: ^2.4.15

flutter:
  config:
    enable-swift-package-manager: false
  uses-material-design: true

