name: togethertrip
description: "TogetherTrip Flutter app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  kakao_flutter_sdk_user: ^1.9.4
  flutter_secure_storage: ^9.2.4
  http: ^1.4.0
  http_parser: ^4.1.2
  image_picker: ^1.1.2
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  geolocator: ^14.0.2
  google_maps_flutter: ^2.13.1
  uuid: ^4.5.2
  sign_in_with_apple: ^8.1.0
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.5
  build_runner: ^2.4.15
  geolocator_platform_interface: ^4.2.8
  google_maps_flutter_platform_interface: ^2.16.0
  plugin_platform_interface: ^2.1.8

flutter:
  config:
    enable-swift-package-manager: false
  uses-material-design: true
  assets:
    - assets/brand/togethertrip-lockup.png
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/PretendardVariable.ttf
